name: Build & Release React Native APK

# Trigger on new tag
on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.0 etc.

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Make Gradle executable
      - run: chmod +x android/gradlew

      # 5️⃣ Setup Java (JDK)
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # 6️⃣ Setup Android SDK
      - uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2

      # 7️⃣ Decode keystore
      - run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/my-release-key.keystore

      # 8️⃣ Build signed APK
      - run: |
          cd android
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=app/release.keystore \
                                   -Pandroid.injected.signing.store.password=$MYAPP_UPLOAD_STORE_PASSWORD\
                                   -Pandroid.injected.signing.key.alias=$MYAPP_UPLOAD_KEY_ALIAS \
                                   -Pandroid.injected.signing.key.password=$MYAPP_UPLOAD_KEY_PASSWORD

      # 9️⃣ Upload APK as artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # 🔟 Create GitHub Release & attach APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
